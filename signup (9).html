<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — eTIMS Concierge</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Fraunces:wght@700;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Syne', sans-serif;
      min-height: 100svh;
      background: linear-gradient(135deg, #0a1a0f 0%, #0f2218 50%, #0a1929 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff; border-radius: 20px;
      padding: 2.5rem; width: 100%; max-width: 480px;
      box-shadow: 0 32px 80px rgba(0,0,0,.35);
    }
    .logo {
      text-align: center; margin-bottom: 1.75rem;
      font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 900;
    }
    .logo .g { color: #235C3F; }
    .logo .b { color: #1976D2; }
    h1 { font-size: 1.5rem; text-align: center; margin-bottom: .35rem; color: #0E1610; }
    .sub { text-align: center; color: #7A9178; font-size: .875rem; margin-bottom: 1.75rem; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media(max-width:480px){ .row { grid-template-columns: 1fr; } }
    .group { margin-bottom: 1rem; }
    label {
      display: block; font-size: .7rem; font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase;
      color: #445542; margin-bottom: .35rem;
    }
    input {
      width: 100%; padding: .75rem 1rem;
      border: 1.5px solid #E8ECE4; border-radius: 10px;
      font-family: 'Syne', sans-serif; font-size: .9rem;
      color: #0E1610; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus { border-color: #34A870; box-shadow: 0 0 0 4px rgba(52,168,112,.12); }
    .hint { font-size: .7rem; color: #7A9178; margin-top: .3rem; }
    .btn {
      width: 100%; padding: .9rem;
      background: linear-gradient(135deg, #52C48A, #235C3F);
      color: #fff; font-family: 'Syne', sans-serif;
      font-size: .95rem; font-weight: 700;
      border: none; border-radius: 10px; cursor: pointer;
      margin-top: .5rem;
      transition: transform .2s, box-shadow .2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(35,92,63,.35); }
    .btn:disabled { opacity: .6; transform: none; cursor: not-allowed; }
    .alert {
      padding: .85rem 1rem; border-radius: 10px;
      font-size: .875rem; margin-bottom: 1rem;
      display: none; border-left: 3px solid;
    }
    .alert.show { display: block; }
    .success { background: #E6F5EE; color: #0F2218; border-color: #34A870; }
    .error   { background: #FDECEA; color: #922B21; border-color: #C0392B; }
    .footer { text-align: center; margin-top: 1.25rem; font-size: .875rem; color: #7A9178; }
    .footer a { color: #235C3F; font-weight: 700; }
    .back { display: block; text-align: center; color: #7A9178; font-size: .8rem; margin-bottom: 1.5rem; }
    .back:hover { color: #235C3F; }
  </style>
</head>
<body>

<div class="card">
  <a href="index.html" class="back">← Back to Home</a>
  <div class="logo"><span class="g">eTIMS</span><span class="b">Concierge</span></div>
  <h1>Create Your Account</h1>
  <p class="sub">Join businesses automating KRA eTIMS compliance</p>

  <div class="alert success" id="msgSuccess">
    ✅ Account created! Redirecting to your dashboard...
  </div>
  <div class="alert error" id="msgError">
    ❌ <span id="errText">Something went wrong.</span>
  </div>

  <div id="theForm">
    <div class="row">
      <div class="group">
        <label for="fullName">Full Name *</label>
        <input type="text" id="fullName" placeholder="Jane Kamau" />
      </div>
      <div class="group">
        <label for="orgName">Company Name *</label>
        <input type="text" id="orgName" placeholder="Kamau & Co. Ltd" />
      </div>
    </div>

    <div class="group">
      <label for="tin">KRA TIN *</label>
      <input type="text" id="tin" placeholder="P051234567A" maxlength="11" />
      <div class="hint">Format: Letter + 9 digits + Letter e.g. P051234567A</div>
    </div>

    <div class="group">
      <label for="email">Business Email *</label>
      <input type="email" id="email" placeholder="jane@company.co.ke" />
    </div>

    <div class="group">
      <label for="password">Password *</label>
      <input type="password" id="password" placeholder="Minimum 6 characters" />
    </div>

    <button class="btn" id="submitBtn" onclick="doSignup()">
      Create Account →
    </button>

    <div class="footer">
      Already have an account? <a href="login.html">Log in →</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ── Init Supabase ──
  const _sb = window.supabase.createClient(
    'https://lreoqxryryoaxpirefwn.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyZW9xeHJ5cnlvYXhwaXJlZnduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2Nzc5MTQsImV4cCI6MjA4ODI1MzkxNH0.OwfIjz4bI02noE6gpleBPKz_V6dmZvaoCrJIzLBNaQk'
  );

  // ── If already logged in, skip to dashboard ──
  _sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'dashboard.html';
  });

  // ── TIN auto-uppercase ──
  document.getElementById('tin').addEventListener('input', function(){
    this.value = this.value.toUpperCase();
  });

  // ── Main signup function ──
  async function doSignup() {
    const fullName = document.getElementById('fullName').value.trim();
    const orgName  = document.getElementById('orgName').value.trim();
    const tin      = document.getElementById('tin').value.trim().toUpperCase();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('submitBtn');

    // Clear messages
    document.getElementById('msgSuccess').classList.remove('show');
    document.getElementById('msgError').classList.remove('show');

    // Validate
    if (!fullName || !orgName || !tin || !email || !password) {
      return showErr('Please fill in all fields.');
    }
    if (!email.includes('@') || !email.includes('.')) {
      return showErr('Please enter a valid email address.');
    }
    if (tin.length !== 11) {
      return showErr('KRA TIN must be exactly 11 characters e.g. P051234567A');
    }
    if (password.length < 6) {
      return showErr('Password must be at least 6 characters.');
    }

    // Loading
    btn.disabled = true;
    btn.textContent = 'Creating account...';

    try {
      // 1. Sign up
      console.log('Signing up:', email);
      const { data: auth, error: authErr } = await _sb.auth.signUp({ email, password });

      if (authErr) throw authErr;
      if (!auth.user) throw new Error('Signup failed — please try again.');
      console.log('User created:', auth.user.id);

      // 2. Create organization
      let orgId = null;
      const { data: existOrg } = await _sb
        .from('organizations')
        .select('id')
        .eq('tin', tin)
        .maybeSingle();

      if (existOrg) {
        orgId = existOrg.id;
        console.log('Using existing org:', orgId);
      } else {
        const { data: newOrg, error: orgErr } = await _sb
          .from('organizations')
          .insert({ name: orgName, tin: tin, email: email })
          .select('id')
          .single();
        if (orgErr) {
          console.warn('Org insert error:', orgErr.message);
        } else {
          orgId = newOrg.id;
          console.log('New org created:', orgId);
        }
      }

      // 3. Create profile
      const profileObj = { id: auth.user.id, full_name: fullName };
      if (orgId) profileObj.organization_id = orgId;

      const { error: profErr } = await _sb.from('profiles').upsert(profileObj);
      if (profErr) console.warn('Profile error:', profErr.message);
      else console.log('Profile saved');

      // 4. Done!
      document.getElementById('msgSuccess').classList.add('show');
      document.getElementById('theForm').style.opacity = '0.4';
      document.getElementById('theForm').style.pointerEvents = 'none';

      console.log('Redirecting to dashboard...');
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 1500);

    } catch(err) {
      console.error('Error:', err);
      let msg = err.message || 'Something went wrong. Please try again.';
      if (msg.includes('already registered') || msg.includes('User already registered')) {
        msg = 'Email already registered. <a href="login.html" style="color:#235C3F;font-weight:700;">Log in instead →</a>';
      }
      showErr(msg);
      btn.disabled = false;
      btn.textContent = 'Create Account →';
    }
  }

  function showErr(msg) {
    document.getElementById('errText').innerHTML = msg;
    document.getElementById('msgError').classList.add('show');
  }
</script>
</body>
</html>
