<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — eTIMS Concierge</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { background: linear-gradient(135deg, #0A1929 0%, #0A2A1F 100%); min-height: 100svh; display: flex; flex-direction: column; }
    .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 4rem 1.5rem; }
    .auth-card {
      width: 100%; max-width: 440px;
      background: var(--surface); border-radius: var(--r-xl);
      padding: 2.75rem 2.5rem;
      box-shadow: var(--shadow-xl);
      animation: slideUp .5s var(--ease-out) both;
    }
    @keyframes slideUp { from{opacity:0;transform:translateY(32px)} to{opacity:1;transform:none} }

    .auth-logo { text-align: center; margin-bottom: 2rem; }
    .auth-logo a { font-family: var(--ff-display); font-size: 1.5rem; font-weight: 900; letter-spacing: -.02em; }
    .auth-logo .g { color: var(--green); }
    .auth-logo .b { color: var(--blue-m); }

    .auth-title { text-align: center; font-size: 1.6rem; margin-bottom: .4rem; }
    .auth-sub  { text-align: center; color: var(--mist); font-size: .9rem; margin-bottom: 2rem; }

    .forgot-row { display: flex; justify-content: flex-end; margin-top: -.5rem; margin-bottom: 1.25rem; }
    .forgot-row a { font-size: .78rem; color: var(--mist); }
    .forgot-row a:hover { color: var(--green); }

    .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; }
    .divider span { font-size: .75rem; color: var(--mist); white-space: nowrap; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: .875rem; color: var(--mist); }
    .auth-footer a { color: var(--green); font-weight: 600; }

    .back-link {
      display: inline-flex; align-items: center; gap: .4rem;
      font-size: .8rem; color: rgba(255,255,255,.4);
      margin-bottom: 1.5rem; transition: color .2s;
      text-align: center; width: 100%; justify-content: center;
    }
    .back-link:hover { color: rgba(255,255,255,.8); }

    .password-wrap { position: relative; }
    .pass-toggle {
      position: absolute; right: .75rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--mist); font-size: .85rem; padding: .25rem;
    }
    .password-wrap input { padding-right: 2.75rem; }

    .reset-form { display: none; }
    .reset-form.active { display: block; }
    .main-form.hidden { display: none; }
  </style>
</head>
<body>

<div class="auth-wrap">
  <div style="width:100%;max-width:440px;">
    <a href="index.html" class="back-link">← Back to Home</a>
    <div class="auth-card">
      <div class="auth-logo">
        <a href="index.html"><span class="g">eTIMS</span><span class="b">Concierge</span></a>
      </div>

      <!-- LOGIN FORM -->
      <div class="main-form" id="mainForm">
        <h1 class="auth-title">Welcome back 👋</h1>
        <p class="auth-sub">Log in to your compliance dashboard</p>

        <div id="alertError" class="alert alert-error">
          <span>❌</span>
          <span id="errorText">Invalid credentials. Please try again.</span>
        </div>
        <div id="alertSuccess" class="alert alert-success">
          <span>✅</span>
          <span>Login successful! Redirecting...</span>
        </div>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input class="form-input" type="email" id="email" name="email"
              placeholder="you@company.co.ke" autocomplete="email" required />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="password-wrap">
              <input class="form-input" type="password" id="password" name="password"
                placeholder="Enter your password" autocomplete="current-password" required />
              <button type="button" class="pass-toggle" id="passToggle" aria-label="Toggle password">👁</button>
            </div>
          </div>

          <div class="forgot-row">
            <a href="#" id="forgotLink">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">
            Log In
          </button>
        </form>
      </div>

      <!-- RESET FORM -->
      <div class="reset-form" id="resetForm">
        <h1 class="auth-title">Reset Password</h1>
        <p class="auth-sub">Enter your email to receive a reset link</p>

        <div id="resetAlert" class="alert alert-info">
          <span>📧</span>
          <span id="resetMsg"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="resetEmail">Email</label>
          <input class="form-input" type="email" id="resetEmail"
            placeholder="you@company.co.ke" />
        </div>
        <button class="btn btn-primary btn-full btn-lg" id="resetBtn" onclick="sendReset()">
          Send Reset Link
        </button>
        <div style="text-align:center;margin-top:1rem;">
          <a href="#" id="backToLogin" style="font-size:.85rem;color:var(--mist);">← Back to Login</a>
        </div>
      </div>

      <div class="divider"><span>or</span></div>
      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign up free →</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabase = window.supabase.createClient(
    'https://lreoqxryryoaxpirefwn.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyZW9xeHJ5cnlvYXhwaXJlZnduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2Nzc5MTQsImV4cCI6MjA4ODI1MzkxNH0.OwfIjz4bI02noE6gpleBPKz_V6dmZvaoCrJIzLBNaQk'
  );

  /* Redirect if already logged in */
  (async () => {
    const { data: { user } } = await supabase.auth.getUser();
    if (user) window.location.href = 'dashboard.html';
  })();

  /* Password toggle */
  document.getElementById('passToggle').addEventListener('click', () => {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  });

  /* Forgot / back links */
  document.getElementById('forgotLink').addEventListener('click', e => {
    e.preventDefault();
    document.getElementById('mainForm').classList.add('hidden');
    document.getElementById('resetForm').classList.add('active');
  });
  document.getElementById('backToLogin').addEventListener('click', e => {
    e.preventDefault();
    document.getElementById('mainForm').classList.remove('hidden');
    document.getElementById('resetForm').classList.remove('active');
  });

  /* Show error */
  function showError(msg) {
    document.getElementById('errorText').textContent = msg;
    document.getElementById('alertError').classList.add('show');
    document.getElementById('alertSuccess').classList.remove('show');
  }

  /* Login form */
  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) { showError('Please enter your email and password.'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Logging in...';
    document.getElementById('alertError').classList.remove('show');

    try {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;

      document.getElementById('alertSuccess').classList.add('show');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
    } catch (err) {
      let msg = err.message || 'Login failed.';
      if (msg.includes('Invalid login')) msg = 'Incorrect email or password. Please try again.';
      showError(msg);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Log In';
    }
  });

  /* Password reset */
  async function sendReset() {
    const email = document.getElementById('resetEmail').value.trim();
    if (!email) return;
    const btn = document.getElementById('resetBtn');
    btn.disabled = true; btn.textContent = 'Sending...';
    try {
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/dashboard.html'
      });
      if (error) throw error;
      document.getElementById('resetMsg').textContent = `Reset link sent to ${email}. Check your inbox.`;
      document.getElementById('resetAlert').classList.add('show');
    } catch (err) {
      document.getElementById('resetMsg').textContent = err.message;
      document.getElementById('resetAlert').style.borderLeftColor = 'var(--danger)';
      document.getElementById('resetAlert').classList.add('show');
    } finally {
      btn.disabled = false; btn.textContent = 'Send Reset Link';
    }
  }
</script>
</body>
</html>
